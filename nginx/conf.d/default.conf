server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Assets generados por Vite (con hash) → cache largo e inmutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Otros estáticos (imágenes, PDFs)
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|pdf|woff2?|ttf|otf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — no se cachea para no servir versiones viejas tras un deploy
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # No exponer ficheros ocultos
    location ~ /\.(?!well-known) {
        deny all;
    }

    error_page 500 502 503 504 /index.html;
}
