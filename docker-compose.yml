# =============================================================
#  Cafanet ISP Web — docker compose
#  El puerto se controla via .env (HOST_PORT). Si no está, usa 8384.
#  Genera el .env con:  ./install.sh   (o .\install.ps1 en Windows)
# =============================================================
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cafanet-web:latest
    container_name: cafanet-web
    ports:
      - "${HOST_PORT:-8384}:80"
    restart: unless-stopped
    networks:
      - cafanet-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.cafanet.service: "web"
      com.cafanet.description: "Cafanet ISP — sitio público"

networks:
  cafanet-net:
    driver: bridge
    name: cafanet-net
